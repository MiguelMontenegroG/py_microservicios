version: "3.9"

# ─────────────────────────────────────────────
# REDES
# ─────────────────────────────────────────────
networks:
  frontend-network:
  backend-network:
  messaging-network:
  data-network:
  observability-network:
  cicd-network:

# ─────────────────────────────────────────────
# VOLÚMENES PERSISTENTES
# ─────────────────────────────────────────────
volumes:
  db-empleados-data:
  db-auth-data:
  db-vacaciones-data:
  mongo-perfiles-data:
  rabbitmq-data:
  elasticsearch-data:
  prometheus-data:
  grafana-data:
  jenkins-data:
  registry-data:

# ─────────────────────────────────────────────
# SERVICIOS
# ─────────────────────────────────────────────
services:

  # ── BASES DE DATOS ──────────────────────────

  db-empleados:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: empleados_db
      POSTGRES_USER: empleados_user
      POSTGRES_PASSWORD: empleados_pass
    volumes:
      - db-empleados-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [data-network]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U empleados_user -d empleados_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    volumes:
      - db-auth-data:/var/lib/postgresql/data
    networks: [data-network]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-vacaciones:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vacaciones_db
      POSTGRES_USER: vacaciones_user
      POSTGRES_PASSWORD: vacaciones_pass
    volumes:
      - db-vacaciones-data:/var/lib/postgresql/data
    networks: [data-network]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vacaciones_user -d vacaciones_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-perfiles:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: perfiles_user
      MONGO_INITDB_ROOT_PASSWORD: perfiles_pass
      MONGO_INITDB_DATABASE: perfiles_db
    volumes:
      - mongo-perfiles-data:/data/db
    networks: [data-network]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MESSAGE BROKER ───────────────────────────

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks: [messaging-network]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MICROSERVICIOS PRINCIPALES ───────────────

  gestion-empleados:
    build:
      context: ./microservicios/gestion-empleados
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-empleados:5432/empleados_db
      SPRING_DATASOURCE_USERNAME: empleados_user
      SPRING_DATASOURCE_PASSWORD: empleados_pass
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      SERVER_PORT: 8082
    ports:
      - "8082:8082"
    depends_on:
      db-empleados:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [backend-network, data-network, messaging-network, observability-network]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  autenticacion:
    build:
      context: ./microservicios/autenticacion
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-auth:5432/auth_db
      SPRING_DATASOURCE_USERNAME: auth_user
      SPRING_DATASOURCE_PASSWORD: auth_pass
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      JWT_SECRET: "cambia_este_secreto_en_produccion_min32chars"
      JWT_EXPIRATION_MS: 86400000
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      db-auth:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [backend-network, data-network, messaging-network, observability-network]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  gestion-perfiles:
    build:
      context: ./microservicios/gestion-perfiles
      dockerfile: Dockerfile
    environment:
      MONGO_URL: mongodb://perfiles_user:perfiles_pass@mongo-perfiles:27017/perfiles_db?authSource=admin
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      PORT: 8083
    ports:
      - "8083:8083"
    depends_on:
      mongo-perfiles:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [backend-network, data-network, messaging-network, observability-network]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  gestion-vacaciones:
    build:
      context: ./microservicios/gestion-vacaciones
      dockerfile: Dockerfile
    environment:
      DB_HOST: db-vacaciones
      DB_PORT: 5432
      DB_NAME: vacaciones_db
      DB_USER: vacaciones_user
      DB_PASSWORD: vacaciones_pass
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      PORT: 8084
    ports:
      - "8084:8084"
    depends_on:
      db-vacaciones:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [backend-network, data-network, messaging-network, observability-network]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8084/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  notificaciones:
    build:
      context: ./microservicios/notificaciones
      dockerfile: Dockerfile
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_FROM: noreply@empresa.com
      PORT: 8085
    ports:
      - "8085:8085"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks: [backend-network, messaging-network, observability-network]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8085/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./microservicios/api-gateway
      dockerfile: Dockerfile
    environment:
      PORT: 8080
      JWT_SECRET: "cambia_este_secreto_en_produccion_min32chars"
      EMPLEADOS_URL: http://gestion-empleados:8082
      AUTH_URL: http://autenticacion:8081
      PERFILES_URL: http://gestion-perfiles:8083
      VACACIONES_URL: http://gestion-vacaciones:8084
    ports:
      - "8080:8080"
    depends_on:
      - gestion-empleados
      - autenticacion
      - gestion-perfiles
      - gestion-vacaciones
    networks: [frontend-network, backend-network]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── SERVIDOR DE CORREO (DEV) ─────────────────

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks: [backend-network]

  # ── OBSERVABILIDAD: LOGS (ELK) ───────────────

  elasticsearch:
    image: elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks: [observability-network]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  logstash:
    image: logstash:8.13.0
    volumes:
      - ./observabilidad/logs/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    ports:
      - "5000:5000/tcp"
      - "5000:5000/udp"
      - "5044:5044"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks: [observability-network]

  filebeat:
    image: elastic/filebeat:8.13.0
    user: root
    volumes:
      - ./observabilidad/logs/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - logstash
    networks: [observability-network]

  kibana:
    image: kibana:8.13.0
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks: [observability-network]

  # ── OBSERVABILIDAD: MÉTRICAS ─────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./observabilidad/monitoreo/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./observabilidad/monitoreo/alertas.yml:/etc/prometheus/alertas.yml
      - prometheus-data:/prometheus
    ports:
      - "9091:9090"
    networks: [observability-network]

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/overview.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observabilidad/dashboards:/etc/grafana/provisioning/dashboards
      - ./observabilidad/monitoreo/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks: [observability-network]

  # ── CI/CD ────────────────────────────────────

  jenkins:
    build:
      context: ./observabilidad/cicd
      dockerfile: Dockerfile.jenkins
    privileged: true
    user: root
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
      CASC_JENKINS_CONFIG: /var/jenkins_home/casc_configs
      JAVA_OPTS: >-
        -Djenkins.install.runSetupWizard=false
        -Dhudson.plugins.git.GitSCM.ALLOW_LOCAL_CHECKOUT=true
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./observabilidad/cicd/jenkins-casc.yml:/var/jenkins_home/casc_configs/jenkins.yml
      - ./observabilidad/cicd/plugins.txt:/usr/share/jenkins/ref/plugins.txt
      - ./microservicios:/var/jenkins_home/microservicios:ro
    ports:
      - "9090:8080"
      - "50000:50000"
    networks: [cicd-network, backend-network]
    command: >
      bash -c "jenkins-plugin-cli --plugin-file /usr/share/jenkins/ref/plugins.txt && /usr/local/bin/jenkins.sh"

  docker-registry:
    image: registry:2
    volumes:
      - registry-data:/var/lib/registry
    ports:
      - "5050:5000"
    networks: [cicd-network]
