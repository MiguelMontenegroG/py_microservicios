jenkins:
  systemMessage: "Sistema de Gesti\u00f3n de Empleados - Microservicios"
  numExecutors: 4
  scmCheckoutRetryCount: 2

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "admin"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  # crumbIssuer desactivado para facilitar pruebas locales
  # crumbIssuer:
  #   standard: {}

unclassified:
  location:
    url: "http://localhost:9090/"

jobs:
  - script: |
      pipelineJob('gestion-empleados') {
        description('Pipeline CI/CD para gestion-empleados')
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/MiguelMontenegroG/py_microservicios')
                  branch('*/master')
                }
              }
            }
            scriptPath('microservicios/gestion-empleados/Jenkinsfile')
            lightweight(true)
          }
        }
        triggers {
          scm('H/5 * * * *')
        }
      }
