global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/alertas.yml"

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8080']
    metrics_path: /metrics

  - job_name: 'autenticacion'
    static_configs:
      - targets: ['autenticacion:8081']
    metrics_path: /actuator/prometheus

  - job_name: 'gestion-empleados'
    static_configs:
      - targets: ['gestion-empleados:8082']
    metrics_path: /actuator/prometheus

  - job_name: 'gestion-perfiles'
    static_configs:
      - targets: ['gestion-perfiles:8083']
    metrics_path: /metrics

  - job_name: 'gestion-vacaciones'
    static_configs:
      - targets: ['gestion-vacaciones:8084']
    metrics_path: /metrics

  - job_name: 'notificaciones'
    static_configs:
      - targets: ['notificaciones:8085']
    metrics_path: /metrics

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
